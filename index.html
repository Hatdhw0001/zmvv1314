<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TxChat · 聊天室</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f; color: #ffffff;
        }

        .auth-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; padding: 20px;
        }

        .auth-screen.hidden { display: none; }

        .auth-card {
            background: #1a1a1a; border-radius: 20px; padding: 32px 24px;
            width: 100%; max-width: 400px; border: 1px solid #2a2a2a; text-align: center;
        }

        .auth-card h2 { margin-bottom: 4px; font-size: 22px; }
        .auth-card p { color: #aaaaaa; margin-bottom: 20px; font-size: 13px; }

        .auth-tabs {
            display: flex; background: #0f0f0f;
            border-radius: 12px; padding: 4px; margin-bottom: 20px;
        }

        .auth-tab {
            flex: 1; padding: 10px; border: none;
            background: transparent; color: #aaaaaa;
            cursor: pointer; border-radius: 10px;
            font-size: 14px; font-weight: 500; transition: 0.2s;
        }

        .auth-tab.active { background: #3a8fd4; color: white; }

        .auth-input {
            width: 100%; padding: 14px 16px;
            background: #0f0f0f; border: 1px solid #2a2a2a;
            border-radius: 12px; color: white;
            font-size: 15px; margin-bottom: 12px; outline: none;
        }

        .auth-input:focus { border-color: #3a8fd4; }

        .auth-btn {
            width: 100%; padding: 14px;
            background: #3a8fd4; border: none;
            border-radius: 12px; color: white;
            font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px;
        }

        .auth-btn:hover { opacity: 0.9; }
        .auth-error { color: #e74c3c; font-size: 13px; margin-top: 8px; min-height: 20px; }

        #mainApp {
            display: none; width: 100%; height: 100vh; height: 100dvh;
            flex-direction: column;
            background-color: #0f0f0f;
            background-image: url('bgh.png');
            background-size: cover; background-repeat: no-repeat;
            background-position: center; background-attachment: fixed;
        }

        #mainApp.active { display: flex; }

        .topbar {
            flex-shrink: 0; padding: 8px 16px;
            background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
            display: flex; align-items: center; justify-content: space-between;
            min-height: 48px; z-index: 10;
        }

        .room-info h3 { font-size: 15px; font-weight: 600; }
        .room-info span { font-size: 12px; color: #4caf50; }

        .topbar-actions { display: flex; gap: 4px; align-items: center; }

        .icon-btn {
            background: none; border: none; color: #aaaaaa;
            font-size: 18px; cursor: pointer; padding: 6px;
            border-radius: 50%; width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
        }

        .icon-btn:hover { background: #252525; color: white; }

        .user-badge {
            display: flex; align-items: center; gap: 6px;
            cursor: pointer; padding: 4px 10px;
            border-radius: 16px; background: #252525;
        }

        .user-badge span { font-size: 13px; }

        .avatar-sm {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 12px; color: white; flex-shrink: 0;
        }

        .messages-wrapper {
            flex: 1; overflow-y: auto; padding: 12px 16px;
            -webkit-overflow-scrolling: touch;
        }

        .msg-row {
            display: flex; gap: 6px; max-width: 75%;
            animation: fadeUp 0.2s ease; margin-bottom: 4px;
            align-self: flex-start; position: relative;
            -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }

        .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.bot { align-self: flex-start; flex-direction: row; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; color: white;
            flex-shrink: 0; align-self: flex-end;
        }

        .msg-sender { font-size: 11px; font-weight: 600; margin-bottom: 1px; padding-left: 4px; }
        .msg-sender.user { color: #3a8fd4; }
        .msg-sender.bot-sender { color: #27ae60; }

        .msg-bubble {
            padding: 6px 10px; border-radius: 6px 12px 12px 6px;
            position: relative; word-break: break-word;
            line-height: 1.4; display: inline-block;
            max-width: 100%; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .msg-bubble.user-bubble { background: #212121; }
        .msg-row.mine .msg-bubble { background: #2b5278; border-radius: 12px 6px 6px 12px; }
        .msg-bubble.bot-bubble { background: #1a2e1a; border: 1px solid #27ae60; border-radius: 6px 12px 12px 6px; }
        .msg-bubble.warning-bubble { background: #3a2a1a; border: 1px solid #e74c3c; border-radius: 6px 12px 12px 6px; }
        .msg-bubble.gold-bubble { background: #2a2510; border: 1px solid #f0c040; border-radius: 6px 12px 12px 6px; }

        .msg-text { font-size: 14px; line-height: 1.4; word-break: break-word; padding-right: 42px; }
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.4); position: absolute; bottom: 4px; right: 7px; }

        .context-menu {
            position: fixed; background: #1a1a1a;
            border: 1px solid #2a2a2a; border-radius: 12px;
            padding: 6px 0; z-index: 200; display: none;
            min-width: 150px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            opacity: 0; transform: scale(0.9);
            transition: opacity 0.15s, transform 0.15s;
        }

        .context-menu.show { display: block; opacity: 1; transform: scale(1); }

        .context-menu-item {
            padding: 12px 20px; cursor: pointer;
            font-size: 15px; display: flex; align-items: center;
            gap: 12px; transition: 0.15s; color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        .context-menu-item:active { background: #252525; }
        .context-menu-item i { width: 20px; text-align: center; font-size: 16px; }
        .context-menu-item.copy { color: #ffffff; }
        .context-menu-item.recall { color: #f39c12; }
        .context-menu-item.delete { color: #e74c3c; }

        .load-more-btn {
            display: block; margin: 10px auto; padding: 8px 20px;
            background: #1a1a1a; border: 1px solid #2a2a2a;
            border-radius: 20px; color: #3a8fd4; cursor: pointer; font-size: 13px;
        }

        .input-bar {
            flex-shrink: 0; padding: 8px 12px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            background: #1a1a1a; border-top: 1px solid #2a2a2a;
            display: flex; gap: 8px; align-items: center; z-index: 10;
        }

        .input-bar input {
            flex: 1; padding: 10px 16px;
            background: #0f0f0f; border: 1px solid #2a2a2a;
            border-radius: 20px; color: white;
            font-size: 15px; outline: none; min-height: 42px;
        }

        .input-bar input:focus { border-color: #3a8fd4; }
        .input-bar input::placeholder { color: #666; }
        .input-bar input.muted { background: #3a1a1a; color: #e74c3c; }

        .send-btn {
            background: #3a8fd4; border: none; color: white;
            width: 42px; height: 42px; border-radius: 50%;
            cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        .send-btn:active { opacity: 0.7; }

        .online-panel {
            position: fixed; right: 0; top: 0;
            height: 100%; width: 260px;
            background: #1a1a1a; border-left: 1px solid #2a2a2a;
            display: flex; flex-direction: column;
            transition: 0.3s; z-index: 50; transform: translateX(100%);
        }

        .online-panel.open { transform: translateX(0); }

        .online-header {
            padding: 12px 14px; border-bottom: 1px solid #2a2a2a;
            display: flex; justify-content: space-between;
            align-items: center; font-weight: 600; font-size: 14px; flex-shrink: 0;
        }

        .online-list { flex: 1; overflow-y: auto; padding: 6px 0; }

        .online-user {
            display: flex; align-items: center; gap: 8px; padding: 8px 14px;
        }

        .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
        .online-dot.muted { background: #e74c3c; }
        .online-user span { font-size: 13px; }
        .online-user .muted-tag { color: #e74c3c; font-size: 11px; }

        .online-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 49; display: none;
        }

        .online-overlay.open { display: block; }

        /* 抽奖提示弹窗 */
        .lottery-toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a; border: 2px solid #f0c040;
            border-radius: 16px; padding: 24px;
            z-index: 300; text-align: center;
            display: none; min-width: 280px;
        }
        .lottery-toast.show { display: block; }
        .lottery-toast h3 { color: #f0c040; margin-bottom: 8px; }
        .lottery-toast p { color: #aaa; font-size: 13px; margin-bottom: 12px; }
        .lottery-toast button {
            padding: 10px 30px; background: #f0c040;
            border: none; border-radius: 20px; color: #000;
            font-weight: 600; cursor: pointer; font-size: 14px;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .messages-area { display: flex; flex-direction: column; width: 100%; }
    </style>
</head>
<body>

    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <h2>🌍 TxChat</h2>
            <p>TX聊天室 · 用户名登录</p>
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">登录</button>
                <button class="auth-tab" id="registerTab" onclick="switchTab('register')">注册</button>
            </div>
            <div id="loginForm">
                <input class="auth-input" type="text" id="loginUsername" placeholder="用户名" autocomplete="off">
                <input class="auth-input" type="password" id="loginPassword" placeholder="密码" autocomplete="off">
                <button class="auth-btn" onclick="handleLogin()">登 录</button>
            </div>
            <div id="registerForm" style="display:none;">
                <input class="auth-input" type="text" id="regUsername" placeholder="设置用户名 (3-15位)" maxlength="15" autocomplete="off">
                <input class="auth-input" type="password" id="regPassword" placeholder="设置密码 (6位以上)" autocomplete="off">
                <input class="auth-input" type="password" id="regPassword2" placeholder="确认密码" autocomplete="off">
                <button class="auth-btn" onclick="handleRegister()">注 册</button>
            </div>
            <div class="auth-error" id="authError"></div>
        </div>
    </div>

    <div id="mainApp">
        <div class="topbar">
            <div class="room-info">
                <h3>🌐 聊天大厅</h3>
                <span id="onlineStatus">在线: 0</span>
            </div>
            <div class="topbar-actions">
                <button class="icon-btn" onclick="toggleOnlinePanel()" title="在线用户">
                    <i class="fas fa-users"></i>
                </button>
                <div class="user-badge" onclick="handleLogout()" title="退出登录">
                    <div class="avatar-sm" id="myAvatarSm" style="background:#3a8fd4;">我</div>
                    <span id="myNameSm">我</span>
                </div>
            </div>
        </div>

        <div class="messages-wrapper" id="messagesWrapper">
            <div class="messages-area" id="messagesArea">
                <button class="load-more-btn" id="loadMoreBtn" onclick="loadMoreMessages()" style="display:none;">
                    加载更多历史消息
                </button>
            </div>
        </div>

        <div class="input-bar">
            <input type="text" id="messageInput" placeholder="输入消息... (发送 #参与抽奖 参加活动)" autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item copy" onclick="copyMessage()"><i class="fas fa-copy"></i> 复制</div>
        <div class="context-menu-item recall" onclick="recallMessage()"><i class="fas fa-undo"></i> 撤回</div>
        <div class="context-menu-item delete" onclick="deleteMessage()"><i class="fas fa-trash"></i> 删除</div>
    </div>

    <div class="online-overlay" id="onlineOverlay" onclick="toggleOnlinePanel()"></div>
    <div class="online-panel" id="onlinePanel">
        <div class="online-header">
            <span>在线用户</span>
            <button class="icon-btn" onclick="toggleOnlinePanel()"><i class="fas fa-times"></i></button>
        </div>
        <div class="online-list" id="onlineList"></div>
    </div>

    <!-- 抽奖参与提示 -->
    <div class="lottery-toast" id="lotteryToast">
        <h3>🎰 参与抽奖成功！</h3>
        <p id="lotteryMsg"></p>
        <button onclick="closeLotteryToast()">知道了</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCI5yewq1Cu5I38LLjuky9KG1rnKh76W4Q",
            authDomain: "zmvv2011.firebaseapp.com",
            databaseURL: "https://zmvv2011-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "zmvv2011",
            storageBucket: "zmvv2011.firebasestorage.app",
            messagingSenderId: "793178735751",
            appId: "1:793178735751:web:626cca2b17d34681cce422",
            measurementId: "G-1ENE8S87JN"
        };

        let database, messagesRef, usersRef, mutesRef, warnsRef, robotConfigRef, lotteryRef;
        let currentUser = null, userRef = null;
        let oldestMessageKey = null;
        let allMessages = {};
        let selectedMsgKey = null, selectedMsgData = null;
        const MESSAGES_PER_PAGE = 50;

        const BOT_CONFIG_ID = 'bot_txchat';

        // 用户状态
        const userMsgLog = {};
        const userAdWarnCount = {};
        const userMuteUntil = {};
        const welcomedToday = {};

        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            messagesRef = database.ref('messages');
            usersRef = database.ref('users');
            mutesRef = database.ref('mutes');
            warnsRef = database.ref('warns');
            robotConfigRef = database.ref('robot_config');
            lotteryRef = database.ref('lottery');
        } catch (e) {
            console.error('Firebase 初始化失败', e);
        }

        // 获取机器人配置
        async function getRobotConfig() {
            const snapshot = await robotConfigRef.once('value');
            return snapshot.val() || getDefaultConfig();
        }

        function getDefaultConfig() {
            return {
                name: 'TxChat小助手', avatar: '#27ae60', enabled: true,
                welcomeEnabled: true,
                welcomeMessages: ['欢迎 {user} 加入TxChat！🌍', '嗨 {user}！欢迎 🎉'],
                dailyWelcomeOnce: true,
                antiSpamEnabled: true, spamThreshold: 5, spamMuteMinutes: 30,
                antiPornEnabled: true, pornMuteMinutes: 60,
                pornWords: ['裸','骚','淫','色情','成人','激情','一夜情','约炮','小姐'],
                antiAdEnabled: true, adWarnLimit: 3, adMuteMinutes: 60,
                adWords: ['加微信','微信号','扫码','赚钱','兼职','代理','加盟','微商','加群','QQ群'],
                blockUrls: true
            };
        }

        function init() {
            const savedUser = localStorage.getItem('telechat_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                enterChatRoom();
            }

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && currentUser) {
                    sendMessage();
                }
            });

            document.addEventListener('click', function(e) {
                const menu = document.getElementById('contextMenu');
                if (menu.classList.contains('show') && !menu.contains(e.target) && !e.target.closest('.msg-row')) {
                    closeContextMenu();
                }
            });

            if (mutesRef) {
                mutesRef.on('value', function(snapshot) {
                    const mutes = snapshot.val() || {};
                    for (const uid in mutes) userMuteUntil[uid] = mutes[uid].until;
                    updateMuteUI();
                });
            }
            if (warnsRef) {
                warnsRef.on('value', function(snapshot) {
                    const warns = snapshot.val() || {};
                    for (const uid in warns) userAdWarnCount[uid] = warns[uid].count || 0;
                });
            }
        }

        // ==================== 抽奖功能 ====================
        async function joinLottery() {
            if (!currentUser) return;
            
            const snapshot = await lotteryRef.once('value');
            const lotteries = snapshot.val() || {};
            
            // 查找进行中的抽奖
            const activeLotteries = Object.entries(lotteries).filter(([k, l]) => l.status === 'active');
            
            if (activeLotteries.length === 0) {
                showLotteryToast('当前没有进行中的抽奖活动');
                return;
            }

            const [lotteryKey, lottery] = activeLotteries[0];
            
            // 检查是否已参与
            if (lottery.participants && lottery.participants[currentUser.id]) {
                showLotteryToast('你已经参与过这个抽奖了！🎯');
                return;
            }

            // 添加参与记录
            await lotteryRef.child(lotteryKey).child('participants').child(currentUser.id).set({
                id: currentUser.id,
                name: currentUser.name,
                avatar: currentUser.avatar,
                joinedAt: firebase.database.ServerValue.TIMESTAMP
            });

            const participantCount = Object.keys(lottery.participants || {}).length + 1;
            showLotteryToast(`✅ 成功参与「${lottery.title}」！\n当前参与人数：${participantCount}人`);
        }

        function showLotteryToast(msg) {
            document.getElementById('lotteryMsg').textContent = msg;
            document.getElementById('lotteryToast').classList.add('show');
            setTimeout(() => closeLotteryToast(), 4000);
        }

        function closeLotteryToast() {
            document.getElementById('lotteryToast').classList.remove('show');
        }

        // ==================== 机器人 ====================
        function sendBotMessage(text, type = 'bot') {
            getRobotConfig().then(config => {
                messagesRef.push({
                    userId: BOT_CONFIG_ID,
                    userName: config.name || 'TxChat小助手',
                    userAvatar: config.avatar || '#27ae60',
                    text: text,
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    type: type
                });
            });
        }

        async function welcomeUser(username) {
            const config = await getRobotConfig();
            if (!config.welcomeEnabled) return;
            
            const today = new Date().toDateString();
            const key = currentUser.id + '_' + today;
            if (config.dailyWelcomeOnce && welcomedToday[key]) return;
            welcomedToday[key] = true;

            const msgs = config.welcomeMessages || getDefaultConfig().welcomeMessages;
            const msg = msgs[Math.floor(Math.random() * msgs.length)].replace('{user}', username);
            setTimeout(() => sendBotMessage(msg), 800);
        }

        function checkSpam(userId, text) {
            const now = Date.now();
            if (!userMsgLog[userId]) userMsgLog[userId] = [];
            userMsgLog[userId] = userMsgLog[userId].filter(m => now - m.time < 10000);
            userMsgLog[userId].push({ text, time: now });
            const same = userMsgLog[userId].filter(m => m.text === text);
            if (same.length >= 5) return { type: 'repeat' };
            const recent = userMsgLog[userId].filter(m => now - m.time < 3000);
            if (recent.length > 4) return { type: 'fast' };
            return null;
        }

        async function checkPorn(text) {
            const config = await getRobotConfig();
            if (!config.antiPornEnabled) return null;
            const words = config.pornWords || getDefaultConfig().pornWords;
            const lower = text.toLowerCase();
            for (const w of words) { if (lower.includes(w.toLowerCase())) return w; }
            return null;
        }

        async function checkAd(text) {
            const config = await getRobotConfig();
            if (!config.antiAdEnabled) return null;
            const words = config.adWords || getDefaultConfig().adWords;
            const lower = text.toLowerCase();
            for (const w of words) { if (lower.includes(w.toLowerCase())) return w; }
            if (config.blockUrls !== false && /(https?:\/\/|www\.|\.com|\.cn|\.net)/i.test(text)) return '链接';
            return null;
        }

        function muteUser(userId, userName, duration, reason) {
            const until = Date.now() + duration;
            userMuteUntil[userId] = until;
            if (mutesRef) mutesRef.child(userId).set({ until, reason, mutedAt: firebase.database.ServerValue.TIMESTAMP });
            const mins = Math.floor(duration / 60000);
            const timeStr = mins >= 60 ? (mins/60)+'小时' : mins+'分钟';
            sendBotMessage(`🚫 ${userName} 因【${reason}】被禁言${timeStr}`, 'warning');
            delete userMsgLog[userId];
        }

        function updateMuteUI() {
            const input = document.getElementById('messageInput');
            if (!input || !currentUser) return;
            const mutedUntil = userMuteUntil[currentUser.id];
            if (mutedUntil && Date.now() < mutedUntil) {
                input.classList.add('muted');
                input.placeholder = `🚫 已禁言，剩余 ${Math.ceil((mutedUntil-Date.now())/60000)} 分钟`;
                input.disabled = true;
            } else {
                input.classList.remove('muted');
                input.placeholder = '输入消息... (发送 #参与抽奖 参加活动)';
                input.disabled = false;
            }
        }

        // ==================== 发送消息 ====================
        async function sendMessage() {
            if (!currentUser) return;

            const mutedUntil = userMuteUntil[currentUser.id];
            if (mutedUntil && Date.now() < mutedUntil) {
                showToast(`🚫 已禁言，剩余 ${Math.ceil((mutedUntil-Date.now())/60000)} 分钟`);
                return;
            }

            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            // 检测抽奖参与
            if (text === '#参与抽奖' || text === '#抽奖' || text === '参与抽奖') {
                input.value = '';
                await joinLottery();
                return;
            }

            const config = await getRobotConfig();

            // 色情检测
            if (config.antiPornEnabled) {
                const pornWord = await checkPorn(text);
                if (pornWord) {
                    input.value = '';
                    showToast('⚠️ 消息包含违规内容');
                    muteUser(currentUser.id, currentUser.name, (config.pornMuteMinutes||60)*60000, '发送色情内容');
                    return;
                }
            }

            // 广告检测
            const adWord = await checkAd(text);
            if (adWord) {
                input.value = '';
                userAdWarnCount[currentUser.id] = (userAdWarnCount[currentUser.id]||0) + 1;
                if (warnsRef) warnsRef.child(currentUser.id).set({ count: userAdWarnCount[currentUser.id], lastWarn: firebase.database.ServerValue.TIMESTAMP });
                const limit = config.adWarnLimit || 3;
                if (userAdWarnCount[currentUser.id] >= limit) {
                    muteUser(currentUser.id, currentUser.name, (config.adMuteMinutes||60)*60000, '多次发送广告');
                    userAdWarnCount[currentUser.id] = 0;
                    if (warnsRef) warnsRef.child(currentUser.id).remove();
                } else {
                    showToast(`⚠️ 请勿发送广告！警告 ${userAdWarnCount[currentUser.id]}/${limit}`);
                    sendBotMessage(`⚠️ ${currentUser.name} 请勿发送广告！${userAdWarnCount[currentUser.id]}/${limit}`, 'warning');
                }
                return;
            }

            // 刷屏检测
            if (config.antiSpamEnabled !== false) {
                const spam = checkSpam(currentUser.id, text);
                if (spam) {
                    input.value = '';
                    const reason = spam.type === 'repeat' ? '重复发送相同消息' : '发送消息过快';
                    showToast('⚠️ ' + reason);
                    muteUser(currentUser.id, currentUser.name, (config.spamMuteMinutes||30)*60000, reason);
                    return;
                }
            }

            // 发送消息
            messagesRef.push({
                userId: currentUser.id,
                userName: currentUser.name,
                userAvatar: currentUser.avatar,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            input.value = ''; input.focus();
        }

        // ==================== 长按菜单 ====================
        let longPressTimer, touchStartY, touchStartX;

        function setupLongPress(el, msgKey, msgData) {
            el.oncontextmenu = e => e.preventDefault();
            el.addEventListener('touchstart', function(e) {
                touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
                longPressTimer = setTimeout(() => {
                    selectedMsgKey = msgKey; selectedMsgData = msgData;
                    showContextMenu(e.touches[0]);
                    if (navigator.vibrate) navigator.vibrate(15);
                }, 600);
            }, { passive: false });
            el.addEventListener('touchmove', function(e) {
                if (Math.abs(e.touches[0].clientX-touchStartX)>10 || Math.abs(e.touches[0].clientY-touchStartY)>10) clearTimeout(longPressTimer);
            }, { passive: false });
            el.addEventListener('touchend', () => clearTimeout(longPressTimer));
            el.addEventListener('touchcancel', () => clearTimeout(longPressTimer));
            el.addEventListener('contextmenu', function(e) {
                e.preventDefault(); selectedMsgKey = msgKey; selectedMsgData = msgData; showContextMenu(e);
            });
        }

        function showContextMenu(event) {
            const menu = document.getElementById('contextMenu');
            const isMine = currentUser && selectedMsgData && selectedMsgData.userId === currentUser.id;
            const isBot = selectedMsgData && (selectedMsgData.type === 'bot' || selectedMsgData.userId === BOT_CONFIG_ID);
            document.querySelector('.context-menu-item.recall').style.display = (isMine && !isBot) ? 'flex' : 'none';
            document.querySelector('.context-menu-item.delete').style.display = (isMine && !isBot) ? 'flex' : 'none';
            const cx = event.clientX || (event.touches?.[0]?.clientX || 100);
            const cy = event.clientY || (event.touches?.[0]?.clientY || 100);
            let x = cx, y = cy;
            if (x+160 > innerWidth) x = innerWidth-170;
            if (y+140 > innerHeight) y = innerHeight-150;
            if (x<10) x=10; if (y<10) y=10;
            menu.style.left = x+'px'; menu.style.top = y+'px';
            menu.classList.add('show');
        }

        function copyMessage() {
            if (selectedMsgData?.text && !selectedMsgData.recalled) {
                navigator.clipboard.writeText(selectedMsgData.text).then(() => showToast('✅ 已复制')).catch(() => showToast('复制失败'));
            }
            closeContextMenu();
        }

        function recallMessage() {
            if (!selectedMsgKey || !currentUser || selectedMsgData.userId !== currentUser.id) { showToast('只能撤回自己的消息'); closeContextMenu(); return; }
            if (Date.now()-selectedMsgData.timestamp > 120000) { showToast('超过2分钟无法撤回'); closeContextMenu(); return; }
            messagesRef.child(selectedMsgKey).update({ text: '该消息已被撤回', recalled: true });
            closeContextMenu(); showToast('✅ 已撤回');
        }

        function deleteMessage() {
            if (!selectedMsgKey || !currentUser || selectedMsgData.userId !== currentUser.id) { showToast('只能删除自己的消息'); closeContextMenu(); return; }
            if (confirm('确定删除？')) { messagesRef.child(selectedMsgKey).remove(); closeContextMenu(); showToast('🗑️ 已删除'); }
            else closeContextMenu();
        }

        function closeContextMenu() { document.getElementById('contextMenu').classList.remove('show'); selectedMsgKey=null; selectedMsgData=null; }

        function showToast(text) {
            let toast = document.getElementById('toast');
            if (!toast) { toast = document.createElement('div'); toast.id = 'toast'; toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:white;padding:10px 22px;border-radius:24px;font-size:14px;z-index:300;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;'; document.body.appendChild(toast); }
            toast.textContent = text; toast.style.opacity = '1';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.style.opacity='0', 2000);
        }

        // ==================== 登录/注册 ====================
        function switchTab(tab) {
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('registerTab').classList.remove('active');
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('authError').textContent = '';
            if (tab === 'login') { document.getElementById('loginTab').classList.add('active'); document.getElementById('loginForm').style.display = 'block'; }
            else { document.getElementById('registerTab').classList.add('active'); document.getElementById('registerForm').style.display = 'block'; }
        }

        function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const pw = document.getElementById('regPassword').value;
            const pw2 = document.getElementById('regPassword2').value;
            if (!username || username.length<3 || username.length>15) { document.getElementById('authError').textContent='用户名3-15字符'; return; }
            if (pw.length<6) { document.getElementById('authError').textContent='密码至少6位'; return; }
            if (pw!==pw2) { document.getElementById('authError').textContent='两次密码不一致'; return; }
            database.ref('accounts/'+username).once('value').then(snapshot => {
                if (snapshot.exists()) { document.getElementById('authError').textContent='用户名已存在'; return Promise.reject(); }
                return database.ref('accounts/'+username).set({ username, password:pw, avatar:randomColor(), createdAt:firebase.database.ServerValue.TIMESTAMP });
            }).then(() => {
                currentUser = { id:username, name:username, avatar:randomColor(), online:true };
                localStorage.setItem('telechat_user', JSON.stringify(currentUser));
                enterChatRoom();
            }).catch(() => {});
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const pw = document.getElementById('loginPassword').value;
            if (!username||!pw) { document.getElementById('authError').textContent='请输入用户名和密码'; return; }
            database.ref('accounts/'+username).once('value').then(snapshot => {
                if (!snapshot.exists()) { document.getElementById('authError').textContent='用户不存在'; return; }
                if (snapshot.val().password !== pw) { document.getElementById('authError').textContent='密码错误'; return; }
                currentUser = { id:username, name:username, avatar:snapshot.val().avatar||randomColor(), online:true };
                localStorage.setItem('telechat_user', JSON.stringify(currentUser));
                enterChatRoom();
            });
        }

        function handleLogout() {
            if (currentUser && userRef) userRef.remove();
            currentUser=null; userRef=null; allMessages={}; oldestMessageKey=null;
            localStorage.removeItem('telechat_user');
            document.getElementById('messagesArea').innerHTML='';
            document.getElementById('mainApp').classList.remove('active');
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('messageInput').disabled=false;
            document.getElementById('messageInput').classList.remove('muted');
        }

        function enterChatRoom() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.add('active');
            document.getElementById('myAvatarSm').style.background=currentUser.avatar;
            document.getElementById('myAvatarSm').textContent=currentUser.name[0].toUpperCase();
            document.getElementById('myNameSm').textContent=currentUser.name;
            userRef=usersRef.child(currentUser.id);
            userRef.set({ id:currentUser.id, name:currentUser.name, avatar:currentUser.avatar, online:true, lastSeen:firebase.database.ServerValue.TIMESTAMP });
            userRef.onDisconnect().remove();
            welcomeUser(currentUser.name);
            updateMuteUI();
            loadLatestMessages();
            listenForNewMessages();
            usersRef.on('value', snapshot => updateOnlineUsers(snapshot.val()||{}));
        }

        function loadLatestMessages() {
            const area=document.getElementById('messagesArea');
            area.innerHTML='<div style="text-align:center;color:#888;padding:30px;">加载中...</div>';
            messagesRef.limitToLast(MESSAGES_PER_PAGE).once('value', snapshot => {
                const msgs=snapshot.val()||{};
                allMessages=msgs; area.innerHTML='';
                const keys=Object.keys(msgs);
                if (keys.length>0) { oldestMessageKey=keys[0]; keys.forEach(k => displayMessage(msgs[k],k,false)); updateLoadMoreButton(keys.length); }
                else area.innerHTML='<div style="text-align:center;color:#888;padding:30px;">暂无消息 🌍</div>';
                scrollToBottom();
            });
        }

        function listenForNewMessages() {
            messagesRef.limitToLast(1).on('child_added', snapshot => {
                const msg=snapshot.val(), key=snapshot.key;
                if (!allMessages[key] && currentUser) { allMessages[key]=msg; displayMessage(msg,key,true); if(!oldestMessageKey) oldestMessageKey=key; }
            });
            messagesRef.on('child_changed', snapshot => { allMessages[snapshot.key]=snapshot.val(); refreshMessages(); });
            messagesRef.on('child_removed', snapshot => { delete allMessages[snapshot.key]; refreshMessages(); });
        }

        function refreshMessages() {
            const area=document.getElementById('messagesArea'); area.innerHTML='';
            const keys=Object.keys(allMessages).sort();
            keys.forEach(k => displayMessage(allMessages[k],k,false));
            if (keys.length===0) area.innerHTML='<div style="text-align:center;color:#888;padding:30px;">暂无消息 🌍</div>';
            updateLoadMoreButton(keys.length);
        }

        function loadMoreMessages() {
            if (!oldestMessageKey) return;
            const btn=document.getElementById('loadMoreBtn');
            btn.textContent='加载中...'; btn.disabled=true;
            messagesRef.orderByKey().endAt(oldestMessageKey).limitToLast(MESSAGES_PER_PAGE+1).once('value', snapshot => {
                const msgs=snapshot.val()||{}, keys=Object.keys(msgs);
                if (keys.length<=1) { btn.textContent='没有更多'; setTimeout(()=>btn.style.display='none',1500); return; }
                keys.pop(); oldestMessageKey=keys[0];
                keys.forEach(k => { if(!allMessages[k]) allMessages[k]=msgs[k]; });
                refreshMessages(); btn.textContent='加载更多'; btn.disabled=false;
            });
        }

        function updateLoadMoreButton(c) { document.getElementById('loadMoreBtn').style.display = c>=MESSAGES_PER_PAGE?'block':'none'; }

        function displayMessage(msg, key, scroll=true) {
            const area=document.getElementById('messagesArea');
            if (!area || msg.type==='system') return;
            const isMine=currentUser&&msg.userId===currentUser.id;
            const isBot=msg.type==='bot'||msg.userId===BOT_CONFIG_ID;
            const isWarning=msg.type==='warning';
            const isGold=msg.type==='lottery'||(msg.text&&msg.text.includes('🎰'));
            const time=msg.timestamp?formatTime(msg.timestamp):'';
            const text=msg.recalled?'<span style="font-style:italic;color:#999;">该消息已被撤回</span>':escapeHtml(msg.text);
            const div=document.createElement('div');
            if (isMine) div.className='msg-row mine';
            else if (isBot||isWarning) div.className='msg-row bot';
            else div.className='msg-row';
            div.setAttribute('data-msg-key', key);
            const senderClass = (isBot||isWarning) ? 'bot-sender' : 'user';
            const bubbleClass = isWarning ? 'warning-bubble' : (isGold ? 'gold-bubble' : (isBot ? 'bot-bubble' : 'user-bubble'));
            const avatarContent = (isBot||isWarning) ? '🤖' : (msg.userName||'?')[0].toUpperCase();
            div.innerHTML = `<div class="msg-avatar" style="background:${msg.userAvatar||'#666'};">${avatarContent}</div><div>${!isMine?`<div class="msg-sender ${senderClass}">${escapeHtml(msg.userName)}${(isBot||isWarning)?' 🤖':''}</div>`:''}<div class="msg-bubble ${bubbleClass}"><div class="msg-text">${text}</div><div class="msg-time">${time}</div></div></div>`;
            setupLongPress(div, key, msg);
            area.appendChild(div);
            if (scroll) setTimeout(scrollToBottom, 50);
        }

        function scrollToBottom() { const w=document.getElementById('messagesWrapper'); if(w) w.scrollTop=w.scrollHeight; }

        function updateOnlineUsers(users) {
            const list=document.getElementById('onlineList'), count=document.getElementById('onlineStatus');
            const arr=Object.values(users);
            if (list) list.innerHTML = arr.map(u => {
                const muted = userMuteUntil[u.id] && Date.now()<userMuteUntil[u.id];
                return `<div class="online-user"><div class="online-dot${muted?' muted':''}"></div><div class="avatar-sm" style="background:${u.avatar};width:24px;height:24px;font-size:11px;">${u.name[0].toUpperCase()}</div><span>${escapeHtml(u.name)}${u.id===currentUser?.id?'(你)':''}</span>${muted?'<span class="muted-tag">禁言</span>':''}</div>`;
            }).join('');
            if (count) count.textContent = '在线: '+arr.length+' · 全球';
        }

        function toggleOnlinePanel() { document.getElementById('onlinePanel').classList.toggle('open'); document.getElementById('onlineOverlay').classList.toggle('open'); }

        function randomColor() { const c=['#e74c3c','#27ae60','#f39c12','#9b59b6','#3498db','#1abc9c','#e91e63','#00bcd4']; return c[Math.floor(Math.random()*c.length)]; }
        function formatTime(ts) { if(!ts)return''; const d=new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
        function escapeHtml(t) { if(!t)return''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

        init();
    </script>

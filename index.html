<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TeleChat · 全球聊天室</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #ffffff;
        }

        /* ========== 登录/注册界面 ========== */
        .auth-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .auth-screen.hidden { display: none; }

        .auth-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #2a2a2a;
            text-align: center;
        }

        .auth-card h2 { margin-bottom: 4px; font-size: 22px; }
        .auth-card p { color: #aaaaaa; margin-bottom: 20px; font-size: 13px; }

        .auth-tabs {
            display: flex;
            background: #0f0f0f;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #aaaaaa;
            cursor: pointer;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
        }

        .auth-tab.active {
            background: #3a8fd4;
            color: white;
        }

        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
        }

        .auth-input:focus { border-color: #3a8fd4; }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #3a8fd4;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
        }

        .auth-btn:hover { opacity: 0.9; }

        .auth-error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }

        /* ========== 聊天界面 ========== */
        #mainApp {
            display: none;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            flex-direction: column;
            background: #0f0f0f;
        }

        #mainApp.active {
            display: flex;
        }

        .topbar {
            flex-shrink: 0;
            padding: 8px 16px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 48px;
            z-index: 10;
        }

        .room-info h3 { font-size: 15px; font-weight: 600; }
        .room-info span { font-size: 12px; color: #4caf50; }

        .topbar-actions { display: flex; gap: 4px; align-items: center; }

        .icon-btn {
            background: none; border: none;
            color: #aaaaaa;
            font-size: 18px; cursor: pointer;
            padding: 6px; border-radius: 50%;
            width: 34px; height: 34px;
            display: flex;
            align-items: center; justify-content: center;
        }

        .icon-btn:hover { background: #252525; color: white; }

        .user-badge {
            display: flex; align-items: center; gap: 6px;
            cursor: pointer; padding: 4px 10px;
            border-radius: 16px; background: #252525;
        }

        .user-badge span { font-size: 13px; }

        .avatar-sm {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 12px; color: white;
            flex-shrink: 0;
        }

        /* ===== 消息区域 - 可滚动 ===== */
        .messages-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            -webkit-overflow-scrolling: touch;
        }

        .system-msg {
            text-align: center;
            color: #aaaaaa;
            font-size: 12px;
            padding: 4px 12px;
            margin: 3px 0;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            display: inline-block;
            width: 100%;
        }

        .msg-row {
            display: flex;
            gap: 6px;
            max-width: 75%;
            animation: fadeUp 0.2s ease;
            margin-bottom: 2px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-row.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
            margin-left: auto;
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            align-self: flex-end;
        }

        .msg-sender {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 1px;
            color: #3a8fd4;
            padding-left: 4px;
        }

        .msg-bubble {
            background: #212121;
            padding: 6px 10px;
            border-radius: 6px 12px 12px 6px;
            position: relative;
            word-break: break-word;
            line-height: 1.4;
            display: inline-block;
            max-width: 100%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .msg-row.mine .msg-bubble {
            background: #2b5278;
            border-radius: 12px 6px 6px 12px;
        }

        .msg-text {
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
            padding-right: 42px;
        }

        .msg-time {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            position: absolute;
            bottom: 4px;
            right: 7px;
        }

        .load-more-btn {
            display: block;
            margin: 10px auto;
            padding: 8px 20px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            color: #3a8fd4;
            cursor: pointer;
            font-size: 13px;
        }

        /* ===== 输入栏 - 固定在底部 ===== */
        .input-bar {
            flex-shrink: 0;
            padding: 8px 12px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 8px;
            align-items: center;
            z-index: 10;
        }

        .input-bar input {
            flex: 1;
            padding: 10px 16px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            color: white;
            font-size: 15px;
            outline: none;
            min-height: 42px;
        }

        .input-bar input:focus {
            border-color: #3a8fd4;
        }

        .input-bar input::placeholder {
            color: #666;
        }

        .send-btn {
            background: #3a8fd4;
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-btn:active {
            opacity: 0.7;
        }

        /* ===== 在线面板 ===== */
        .online-panel {
            position: fixed;
            right: 0;
            top: 0;
            height: 100%;
            width: 260px;
            background: #1a1a1a;
            border-left: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            z-index: 50;
            transform: translateX(100%);
        }

        .online-panel.open {
            transform: translateX(0);
        }

        .online-header {
            padding: 12px 14px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        .online-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .online-user {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            flex-shrink: 0;
        }

        .online-user span { font-size: 13px; }

        .online-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 49;
            display: none;
        }

        .online-overlay.open {
            display: block;
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* ===== 消息区域布局 ===== */
        .messages-area {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- ==================== 登录/注册界面 ==================== -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <h2>🌍 TeleChat</h2>
            <p>全球聊天室 · 用户名登录</p>

            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">登录</button>
                <button class="auth-tab" id="registerTab" onclick="switchTab('register')">注册</button>
            </div>

            <div id="loginForm">
                <input class="auth-input" type="text" id="loginUsername" placeholder="用户名" autocomplete="off">
                <input class="auth-input" type="password" id="loginPassword" placeholder="密码" autocomplete="off">
                <button class="auth-btn" onclick="handleLogin()">登 录</button>
            </div>

            <div id="registerForm" style="display:none;">
                <input class="auth-input" type="text" id="regUsername" placeholder="设置用户名 (3-15位)" maxlength="15" autocomplete="off">
                <input class="auth-input" type="password" id="regPassword" placeholder="设置密码 (6位以上)" autocomplete="off">
                <input class="auth-input" type="password" id="regPassword2" placeholder="确认密码" autocomplete="off">
                <button class="auth-btn" onclick="handleRegister()">注 册</button>
            </div>

            <div class="auth-error" id="authError"></div>
        </div>
    </div>

    <!-- ==================== 聊天界面 ==================== -->
    <div id="mainApp">
        <!-- 顶部栏 -->
        <div class="topbar">
            <div class="room-info">
                <h3>🌐 公共大厅</h3>
                <span id="onlineStatus">在线: 0</span>
            </div>
            <div class="topbar-actions">
                <button class="icon-btn" onclick="toggleOnlinePanel()" title="在线用户">
                    <i class="fas fa-users"></i>
                </button>
                <div class="user-badge" onclick="handleLogout()" title="退出登录">
                    <div class="avatar-sm" id="myAvatarSm" style="background:#3a8fd4;">我</div>
                    <span id="myNameSm">我</span>
                </div>
            </div>
        </div>

        <!-- 消息区域（可滚动） -->
        <div class="messages-wrapper" id="messagesWrapper">
            <div class="messages-area" id="messagesArea">
                <button class="load-more-btn" id="loadMoreBtn" onclick="loadMoreMessages()" style="display:none;">
                    加载更多历史消息
                </button>
            </div>
        </div>

        <!-- 输入栏（固定在底部） -->
        <div class="input-bar">
            <input type="text" id="messageInput" placeholder="输入消息... (永久保存)" autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- ==================== 在线面板 ==================== -->
    <div class="online-overlay" id="onlineOverlay" onclick="toggleOnlinePanel()"></div>
    <div class="online-panel" id="onlinePanel">
        <div class="online-header">
            <span>在线用户</span>
            <button class="icon-btn" onclick="toggleOnlinePanel()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="online-list" id="onlineList"></div>
    </div>

    <script>
        // ==================== Firebase 配置 ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCI5yewq1Cu5I38LLjuky9KG1rnKh76W4Q",
            authDomain: "zmvv2011.firebaseapp.com",
            databaseURL: "https://zmvv2011-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "zmvv2011",
            storageBucket: "zmvv2011.firebasestorage.app",
            messagingSenderId: "793178735751",
            appId: "1:793178735751:web:626cca2b17d34681cce422",
            measurementId: "G-1ENE8S87JN"
        };

        let database;
        let messagesRef;
        let usersRef;
        let currentUser = null;
        let userRef = null;
        let oldestMessageKey = null;
        let allMessages = {};
        const MESSAGES_PER_PAGE = 50;

        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            messagesRef = database.ref('messages');
            usersRef = database.ref('users');
        } catch (e) {
            console.error('Firebase 初始化失败', e);
        }

        // ==================== 初始化 ====================
        function init() {
            const savedUser = localStorage.getItem('telechat_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                enterChatRoom();
            }

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && currentUser) {
                    sendMessage();
                }
            });
        }

        // ==================== 登录/注册 ====================
        function switchTab(tab) {
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('registerTab').classList.remove('active');
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('authError').textContent = '';

            if (tab === 'login') {
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('loginForm').style.display = 'block';
            } else {
                document.getElementById('registerTab').classList.add('active');
                document.getElementById('registerForm').style.display = 'block';
            }
        }

        function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const password2 = document.getElementById('regPassword2').value;

            if (!username || username.length < 3 || username.length > 15) {
                document.getElementById('authError').textContent = '用户名需要3-15个字符';
                return;
            }
            if (password.length < 6) {
                document.getElementById('authError').textContent = '密码至少6位';
                return;
            }
            if (password !== password2) {
                document.getElementById('authError').textContent = '两次密码不一致';
                return;
            }

            database.ref('accounts/' + username).once('value').then(function(snapshot) {
                if (snapshot.exists()) {
                    document.getElementById('authError').textContent = '用户名已存在，请换一个';
                    return Promise.reject('用户名已存在');
                }
                return database.ref('accounts/' + username).set({
                    username: username,
                    password: password,
                    avatar: randomColor(),
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
            }).then(function() {
                currentUser = {
                    id: username,
                    name: username,
                    avatar: randomColor(),
                    online: true
                };
                localStorage.setItem('telechat_user', JSON.stringify(currentUser));
                enterChatRoom();
            }).catch(function(error) {
                if (error !== '用户名已存在') {
                    document.getElementById('authError').textContent = '注册失败，请重试';
                }
            });
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                document.getElementById('authError').textContent = '请输入用户名和密码';
                return;
            }

            database.ref('accounts/' + username).once('value').then(function(snapshot) {
                if (!snapshot.exists()) {
                    document.getElementById('authError').textContent = '用户不存在，请先注册';
                    return;
                }

                const account = snapshot.val();
                if (account.password !== password) {
                    document.getElementById('authError').textContent = '密码错误';
                    return;
                }

                currentUser = {
                    id: username,
                    name: username,
                    avatar: account.avatar || randomColor(),
                    online: true
                };

                localStorage.setItem('telechat_user', JSON.stringify(currentUser));
                enterChatRoom();
            }).catch(function(error) {
                document.getElementById('authError').textContent = '登录失败，请重试';
            });
        }

        function handleLogout() {
            if (currentUser && userRef) {
                messagesRef.push({
                    type: 'system',
                    text: '👋 ' + currentUser.name + ' 离开了聊天室',
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                userRef.remove();
            }
            
            currentUser = null;
            userRef = null;
            allMessages = {};
            oldestMessageKey = null;
            localStorage.removeItem('telechat_user');
            document.getElementById('messagesArea').innerHTML = '';
            document.getElementById('mainApp').classList.remove('active');
            document.getElementById('authScreen').classList.remove('hidden');
        }

        // ==================== 聊天室 ====================
        function enterChatRoom() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.add('active');
            
            document.getElementById('myAvatarSm').style.background = currentUser.avatar;
            document.getElementById('myAvatarSm').textContent = currentUser.name[0].toUpperCase();
            document.getElementById('myNameSm').textContent = currentUser.name;

            userRef = usersRef.child(currentUser.id);
            userRef.set({
                id: currentUser.id,
                name: currentUser.name,
                avatar: currentUser.avatar,
                online: true,
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });
            userRef.onDisconnect().remove();

            messagesRef.push({
                type: 'system',
                text: '👋 ' + currentUser.name + ' 加入了聊天室',
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            loadLatestMessages();
            listenForNewMessages();

            usersRef.on('value', function(snapshot) {
                const users = snapshot.val() || {};
                updateOnlineUsers(users);
            });
        }

        function loadLatestMessages() {
            const area = document.getElementById('messagesArea');
            area.innerHTML = '<div style="text-align:center;color:#888;padding:30px;">加载历史消息中...</div>';

            messagesRef.limitToLast(MESSAGES_PER_PAGE).once('value', function(snapshot) {
                const messages = snapshot.val() || {};
                allMessages = messages;
                
                area.innerHTML = '';
                
                const keys = Object.keys(messages);
                if (keys.length > 0) {
                    oldestMessageKey = keys[0];
                    keys.forEach(key => {
                        displayMessage(messages[key], false);
                    });
                    updateLoadMoreButton(keys.length);
                } else {
                    area.innerHTML = '<div style="text-align:center;color:#888;padding:30px;">暂无消息，发送第一条消息吧！🌍</div>';
                }
                
                scrollToBottom();
            });
        }

        function listenForNewMessages() {
            messagesRef.limitToLast(1).on('child_added', function(snapshot) {
                const msg = snapshot.val();
                const msgKey = snapshot.key;
                
                if (!allMessages[msgKey] && currentUser) {
                    allMessages[msgKey] = msg;
                    displayMessage(msg, true);
                    if (!oldestMessageKey) {
                        oldestMessageKey = msgKey;
                    }
                }
            });
        }

        function loadMoreMessages() {
            if (!oldestMessageKey) return;
            
            const btn = document.getElementById('loadMoreBtn');
            btn.textContent = '加载中...';
            btn.disabled = true;

            messagesRef.orderByKey().endAt(oldestMessageKey).limitToLast(MESSAGES_PER_PAGE + 1).once('value', function(snapshot) {
                const messages = snapshot.val() || {};
                const keys = Object.keys(messages);
                
                if (keys.length <= 1) {
                    btn.textContent = '没有更多消息了';
                    setTimeout(() => { btn.style.display = 'none'; }, 1500);
                    return;
                }

                keys.pop();
                oldestMessageKey = keys[0];
                
                keys.forEach(key => {
                    if (!allMessages[key]) {
                        allMessages[key] = messages[key];
                    }
                });

                const area = document.getElementById('messagesArea');
                area.innerHTML = '';
                
                const allKeys = Object.keys(allMessages).sort();
                allKeys.forEach(key => {
                    displayMessage(allMessages[key], false);
                });
                
                updateLoadMoreButton(allKeys.length);
                btn.textContent = '加载更多历史消息';
                btn.disabled = false;
            });
        }

        function updateLoadMoreButton(count) {
            const btn = document.getElementById('loadMoreBtn');
            btn.style.display = count >= MESSAGES_PER_PAGE ? 'block' : 'none';
        }

        function sendMessage() {
            if (!currentUser) return;

            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            messagesRef.push({
                userId: currentUser.id,
                userName: currentUser.name,
                userAvatar: currentUser.avatar,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            input.value = '';
            input.focus();
        }

        function displayMessage(msg, scrollToBottom = true) {
            const area = document.getElementById('messagesArea');
            if (!area) return;

            if (msg.type === 'system') {
                area.innerHTML += '<div class="system-msg">' + escapeHtml(msg.text) + '</div>';
            } else {
                const isMine = currentUser && msg.userId === currentUser.id;
                const time = msg.timestamp ? formatTime(msg.timestamp) : '';
                area.innerHTML += `
                    <div class="msg-row ${isMine ? 'mine' : ''}">
                        <div class="msg-avatar" style="background:${msg.userAvatar || '#666'};">
                            ${(msg.userName || '?')[0].toUpperCase()}
                        </div>
                        <div>
                            ${!isMine ? '<div class="msg-sender">' + escapeHtml(msg.userName) + '</div>' : ''}
                            <div class="msg-bubble">
                                <div class="msg-text">${escapeHtml(msg.text)}</div>
                                <div class="msg-time">${time}</div>
                            </div>
                        </div>
                    </div>`;
            }
            
            if (scrollToBottom) {
                setTimeout(scrollToBottom, 50);
            }
        }

        function scrollToBottom() {
            const wrapper = document.getElementById('messagesWrapper');
            if (wrapper) {
                wrapper.scrollTop = wrapper.scrollHeight;
            }
        }

        function updateOnlineUsers(users) {
            const list = document.getElementById('onlineList');
            const count = document.getElementById('onlineStatus');
            const userArray = Object.values(users);
            
            if (list) {
                list.innerHTML = userArray.map(u => `
                    <div class="online-user">
                        <div class="online-dot"></div>
                        <div class="avatar-sm" style="background:${u.avatar};width:24px;height:24px;font-size:11px;">
                            ${u.name[0].toUpperCase()}
                        </div>
                        <span>${escapeHtml(u.name)} ${u.id === currentUser?.id ? '(你)' : ''}</span>
                    </div>
                `).join('');
            }
            
            if (count) {
                count.textContent = '在线: ' + userArray.length + ' · 全球';
            }
        }

        function toggleOnlinePanel() {
            const panel = document.getElementById('onlinePanel');
            const overlay = document.getElementById('onlineOverlay');
            panel.classList.toggle('open');
            overlay.classList.toggle('open');
        }

        // ==================== 工具函数 ====================
        function randomColor() {
            const colors = ['#e74c3c','#27ae60','#f39c12','#9b59b6','#3498db','#1abc9c','#e91e63','#00bcd4'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const d = new Date(timestamp);
            return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== 启动 ====================
        init();
    </script>
</body>
</html>

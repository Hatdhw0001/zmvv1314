<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TxChat · 后台管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
            --accent: #3a8fd4; --danger: #e74c3c; --warning: #f39c12;
            --success: #27ae60; --gold: #f0c040; --text: #e0e0e0; --text2: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            width: 100%; height: 100vh; overflow: hidden;
        }
        .login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999;
        }
        .login-screen.hidden { display: none; }
        .login-card {
            background: var(--surface); border-radius: 16px; padding: 40px 30px;
            width: 90%; max-width: 380px; border: 1px solid var(--border); text-align: center;
        }
        .login-card h2 { margin-bottom: 8px; font-size: 22px; }
        .login-card input {
            width: 100%; padding: 14px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 10px;
            color: white; font-size: 15px; margin-bottom: 12px; outline: none;
        }
        .login-card button {
            width: 100%; padding: 14px; background: var(--accent);
            border: none; border-radius: 10px; color: white; font-size: 16px; cursor: pointer;
        }
        .admin-container { display: flex; width: 100%; height: 100vh; }
        .sidebar {
            width: 220px; background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar-header { padding: 20px 16px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 700; text-align: center; }
        .sidebar-nav { flex: 1; padding: 10px 0; overflow-y: auto; }
        .nav-item {
            padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            font-size: 14px; color: var(--text2); border-left: 3px solid transparent; transition: 0.2s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
        .nav-item.active { background: rgba(58,143,212,0.1); color: var(--accent); border-left-color: var(--accent); }
        .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); }
        .logout-btn { width: 100%; padding: 10px; background: var(--danger); border: none; border-radius: 8px; color: white; cursor: pointer; }
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-header {
            padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
            font-size: 18px; font-weight: 600; display: flex; justify-content: space-between; align-items: center;
        }
        .content-body { flex: 1; overflow-y: auto; padding: 20px 24px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
        .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
        .table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: var(--bg); padding: 10px 12px; text-align: left; color: var(--text2); font-size: 11px; border-bottom: 1px solid var(--border); }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
        .badge-success { background: rgba(39,174,96,0.2); color: var(--success); }
        .badge-danger { background: rgba(231,76,60,0.2); color: var(--danger); }
        .badge-warning { background: rgba(243,156,18,0.2); color: var(--warning); }
        .badge-gold { background: rgba(240,192,64,0.2); color: var(--gold); }
        .action-btn {
            padding: 5px 10px; border: 1px solid var(--border); border-radius: 5px;
            background: transparent; color: var(--text); cursor: pointer; font-size: 11px; margin: 1px;
        }
        .action-btn.gold { color: var(--gold); border-color: var(--gold); }
        .action-btn.danger { color: var(--danger); border-color: var(--danger); }
        .action-btn.success { color: var(--success); border-color: var(--success); }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 12px; color: var(--text2); }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: white; font-size: 13px; outline: none; }
        .form-group input:focus { border-color: var(--accent); }
        .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .prize-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .prize-row input { flex: 1; }
        .lottery-card {
            background: var(--surface); border: 1px solid var(--gold); border-radius: 12px;
            padding: 20px; margin-bottom: 12px;
        }
        .lottery-card h3 { color: var(--gold); }
        @media (max-width: 768px) {
            .sidebar { width: 50px; }
            .sidebar .nav-item span, .sidebar-header span { display: none; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h2>🛡️ 后台管理</h2>
        <input type="password" id="adminPassword" placeholder="管理密码" autocomplete="off">
        <button onclick="handleAdminLogin()">登 录</button>
        <p style="margin-top:12px;font-size:11px;color:var(--text2);">默认密码: admin123</p>
    </div>
</div>

<div class="admin-container" id="adminPanel" style="display:none;">
    <div class="sidebar">
        <div class="sidebar-header"><span>TxChat 管理</span></div>
        <div class="sidebar-nav">
            <div class="nav-item active" onclick="switchPage('dashboard',this)"><i class="fas fa-th-large"></i><span>仪表盘</span></div>
            <div class="nav-item" onclick="switchPage('users',this)"><i class="fas fa-users"></i><span>用户管理</span></div>
            <div class="nav-item" onclick="switchPage('messages',this)"><i class="fas fa-comments"></i><span>消息管理</span></div>
            <div class="nav-item" onclick="switchPage('mutes',this)"><i class="fas fa-ban"></i><span>禁言管理</span></div>
            <div class="nav-item" onclick="switchPage('robot',this)"><i class="fas fa-robot"></i><span>机器人</span></div>
            <div class="nav-item" onclick="switchPage('lottery',this)"><i class="fas fa-gift"></i><span>抽奖管理</span></div>
            <div class="nav-item" onclick="switchPage('settings',this)"><i class="fas fa-cog"></i><span>系统设置</span></div>
        </div>
        <div class="sidebar-footer"><button class="logout-btn" onclick="handleLogout()">退出</button></div>
    </div>
    <div class="content">
        <div class="content-header"><span id="pageTitle">📊 仪表盘</span></div>
        <div class="content-body" id="contentBody"></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCI5yewq1Cu5I38LLjuky9KG1rnKh76W4Q",
    authDomain: "zmvv2011.firebaseapp.com",
    databaseURL: "https://zmvv2011-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "zmvv2011",
    storageBucket: "zmvv2011.firebasestorage.app",
    messagingSenderId: "793178735751",
    appId: "1:793178735751:web:626cca2b17d34681cce422"
};

const ADMIN_PASSWORD = 'admin123';
let database, accountsRef, messagesRef, usersRef, mutesRef, warnsRef, robotConfigRef, lotteryRef;

try {
    firebase.initializeApp(firebaseConfig);
    database = firebase.database();
    accountsRef = database.ref('accounts');
    messagesRef = database.ref('messages');
    usersRef = database.ref('users');
    mutesRef = database.ref('mutes');
    warnsRef = database.ref('warns');
    robotConfigRef = database.ref('robot_config');
    lotteryRef = database.ref('lottery');
} catch (e) { console.error(e); }

function handleAdminLogin() {
    if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('adminPanel').style.display = 'flex';
        loadDashboard();
    }
}
function handleLogout() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('adminPassword').value = '';
}
document.getElementById('adminPassword').addEventListener('keydown', e => { if(e.key==='Enter') handleAdminLogin(); });

function switchPage(page, el) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    if (el) el.classList.add('active');
    const titles = { dashboard:'📊 仪表盘', users:'👥 用户管理', messages:'💬 消息管理', mutes:'🚫 禁言管理', robot:'🤖 机器人管理', lottery:'🎰 抽奖管理', settings:'⚙️ 系统设置' };
    document.getElementById('pageTitle').textContent = titles[page]||'';
    switch(page) {
        case 'dashboard': loadDashboard(); break;
        case 'users': loadUsers(); break;
        case 'messages': loadMessages(); break;
        case 'mutes': loadMutes(); break;
        case 'robot': loadRobotPage(); break;
        case 'lottery': loadLotteryPage(); break;
        case 'settings': loadSettings(); break;
    }
}

// ==================== 仪表盘 ====================
function loadDashboard() {
    Promise.all([accountsRef.once('value'), messagesRef.once('value'), usersRef.once('value'), mutesRef.once('value'), lotteryRef.once('value')])
    .then(([a,m,u,mu,l]) => {
        const tu = Object.keys(a.val()||{}).length, tm = Object.keys(m.val()||{}).length;
        const ou = Object.keys(u.val()||{}).length, mu2 = Object.keys(mu.val()||{}).length;
        const al = Object.values(l.val()||{}).filter(x=>x.status==='active').length;
        document.getElementById('contentBody').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value">${tu}</div><div class="stat-label">注册用户</div></div>
                <div class="stat-card"><div class="stat-value">${ou}</div><div class="stat-label">在线用户</div></div>
                <div class="stat-card"><div class="stat-value">${tm}</div><div class="stat-label">总消息</div></div>
                <div class="stat-card"><div class="stat-value">${mu2}</div><div class="stat-label">禁言中</div></div>
                <div class="stat-card"><div class="stat-value" style="color:var(--gold)">${al}</div><div class="stat-label">进行中抽奖</div></div>
            </div>`;
    });
}

// ==================== 用户/消息/禁言（简化） ====================
function loadUsers() {
    Promise.all([accountsRef.once('value'), mutesRef.once('value')]).then(([a,mu]) => {
        const ac = a.val()||{}, mt = mu.val()||{};
        let h = '<div class="table-container"><table><tr><th>用户名</th><th>禁言</th><th>操作</th></tr>';
        Object.entries(ac).forEach(([k,v]) => {
            const muted = mt[k] && mt[k].until > Date.now();
            h += `<tr><td>${v.username}</td><td>${muted?'<span class="badge badge-danger">是</span>':'<span class="badge badge-success">否</span>'}</td>
            <td>${muted?`<button class="action-btn success" onclick="unmute('${k}')">解除</button>`:`<button class="action-btn warning" onclick="muteUser('${k}')">禁言</button>`}
            <button class="action-btn danger" onclick="deleteUser('${k}')">删除</button></td></tr>`;
        });
        h += '</table></div>';
        document.getElementById('contentBody').innerHTML = h;
    });
}
function muteUser(uid) { const m = prompt('禁言多少分钟？','30'); if(m&&m>0){ mutesRef.child(uid).set({until:Date.now()+m*60000,reason:'管理员禁言'}); alert('已禁言'); loadUsers(); } }
function unmute(uid) { if(confirm('解除禁言？')){ mutesRef.child(uid).remove(); alert('已解除'); loadUsers(); } }
function deleteUser(uid) { if(confirm('删除用户？')){ accountsRef.child(uid).remove(); usersRef.child(uid).remove(); mutesRef.child(uid).remove(); alert('已删除'); loadUsers(); } }

function loadMessages() {
    messagesRef.limitToLast(50).once('value').then(s => {
        const ms = s.val()||{};
        let h = '<div class="table-container"><table><tr><th>用户</th><th>内容</th><th>操作</th></tr>';
        Object.keys(ms).reverse().forEach(k => {
            const m = ms[k];
            h += `<tr><td>${m.userName||'?'}</td><td>${(m.text||'').substring(0,40)}</td><td><button class="action-btn danger" onclick="delMsg('${k}')">删除</button></td></tr>`;
        });
        h += '</table></div>';
        document.getElementById('contentBody').innerHTML = h;
    });
}
function delMsg(k) { if(confirm('删除消息？')){ messagesRef.child(k).remove(); loadMessages(); } }

function loadMutes() {
    mutesRef.once('value').then(s => {
        const mt = s.val()||{};
        let h = '<div class="table-container"><table><tr><th>用户</th><th>到期</th><th>操作</th></tr>';
        Object.entries(mt).forEach(([k,v]) => {
            h += `<tr><td>${k}</td><td>${new Date(v.until).toLocaleString('zh-CN')}</td><td><button class="action-btn success" onclick="unmute('${k}')">解除</button></td></tr>`;
        });
        h += '</table></div>';
        document.getElementById('contentBody').innerHTML = h;
    });
}

// ==================== 机器人管理（简化） ====================
async function loadRobotPage() {
    const c = (await robotConfigRef.once('value')).val() || { name:'TxChat小助手', avatar:'#27ae60', enabled:true };
    document.getElementById('contentBody').innerHTML = `
        <div class="table-container"><div class="table-header">🤖 基本设置</div>
        <div style="padding:16px;">
            <div class="grid-2"><div class="form-group"><label>名称</label><input id="rName" value="${c.name||''}"></div><div class="form-group"><label>颜色</label><input type="color" id="rAvatar" value="${c.avatar||'#27ae60'}" style="height:36px;"></div></div>
            <button class="action-btn success" onclick="saveRobot()" style="padding:10px 20px;">💾 保存</button>
        </div></div>`;
}
async function saveRobot() {
    await robotConfigRef.set({ name: document.getElementById('rName').value, avatar: document.getElementById('rAvatar').value, enabled: true });
    alert('✅ 已保存');
}

// ==================== 🎰 抽奖管理（新版） ====================
async function loadLotteryPage() {
    const s = await lotteryRef.once('value');
    const lotteries = s.val() || {};
    let html = `<div class="flex-between" style="margin-bottom:16px;"><h3>🎰 抽奖活动</h3><button class="action-btn gold" onclick="showCreateLottery()" style="padding:10px 16px;font-size:13px;">➕ 创建抽奖</button></div>`;

    const active = Object.entries(lotteries).filter(([k,l])=>l.status==='active');
    const ended = Object.entries(lotteries).filter(([k,l])=>l.status!=='active');

    if (active.length > 0) {
        html += '<h4 style="color:var(--gold);margin-bottom:8px;">🟢 进行中</h4>';
        active.forEach(([k,l]) => html += renderLotteryCard(k,l,true));
    }
    if (ended.length > 0) {
        html += '<h4 style="color:var(--text2);margin:16px 0 8px;">🔴 已结束</h4>';
        ended.forEach(([k,l]) => html += renderLotteryCard(k,l,false));
    }
    if (Object.keys(lotteries).length === 0) html += '<div style="text-align:center;color:var(--text2);padding:40px;">暂无抽奖活动</div>';

    document.getElementById('contentBody').innerHTML = html;
}

function renderLotteryCard(key, lottery, isActive) {
    const p = lottery.participants || {};
    const w = lottery.winners || [];
    const prizes = lottery.prizes || [];
    const count = Object.keys(p).length;
    const endTime = new Date(lottery.endTime);
    const now = Date.now();
    const left = endTime - now;
    const timeStr = left <= 0 ? '已到期' : `${Math.floor(left/3600000)}小时${Math.floor((left%3600000)/60000)}分钟`;

    let prizeStr = prizes.map(pr => `${pr.name} x ${pr.count||1}`).join(', ');

    return `
    <div class="lottery-card">
        <h3>🎁 ${lottery.title}</h3>
        <p style="font-size:12px;color:var(--text2);">⏰ ${timeStr} | 👥 ${count}人 | 🎯 ${lottery.winnerCount||1}人中奖</p>
        <p style="font-size:12px;color:var(--text2);">🏆 奖品: ${prizeStr}</p>
        ${w.length > 0 ? `<p style="font-size:12px;color:var(--gold);">🎉 中奖: ${w.map(x=>x.name).join(', ')}</p>` : ''}
        <div style="margin-top:10px;">
            ${isActive ? `
                <button class="action-btn gold" onclick="drawNow('${key}')">🎯 立即开奖</button>
                <button class="action-btn" onclick="broadcastLottery('${key}')">📢 广播</button>
                <button class="action-btn danger" onclick="cancelLottery('${key}')">取消</button>
            ` : `<button class="action-btn danger" onclick="deleteLottery('${key}')">删除</button>`}
        </div>
    </div>`;
}

function showCreateLottery() {
    const h = `
        <div class="table-container" style="max-width:600px;">
            <div class="table-header">➕ 创建抽奖</div>
            <div style="padding:16px;">
                <div class="form-group"><label>抽奖标题</label><input id="ltTitle" value="TX聊天室 发起了抽奖活动"></div>
                <div class="grid-2">
                    <div class="form-group"><label>中奖人数</label><input type="number" id="ltWinCount" value="1" min="1"></div>
                    <div class="form-group"><label>持续时间(小时)</label><input type="number" id="ltHours" value="24" min="1"></div>
                </div>
                <div class="form-group"><label>奖品列表</label>
                    <div id="prizeList">
                        <div class="prize-row"><input placeholder="奖品名称" class="prize-name" value="18cny"><input placeholder="数量" type="number" class="prize-count" value="6" min="1" style="width:80px;"></div>
                    </div>
                    <button class="action-btn" onclick="addPrize()" style="margin-top:6px;">➕ 添加奖品</button>
                </div>
                <div style="display:flex;gap:10px;margin-top:16px;">
                    <button class="action-btn gold" onclick="createLottery()" style="flex:1;padding:12px;">🎰 创建并广播</button>
                    <button class="action-btn" onclick="loadLotteryPage()" style="flex:1;padding:12px;">取消</button>
                </div>
            </div>
        </div>`;
    document.getElementById('contentBody').innerHTML = h;
}

function addPrize() {
    const div = document.createElement('div');
    div.className = 'prize-row';
    div.innerHTML = `<input placeholder="奖品名称" class="prize-name"><input placeholder="数量" type="number" class="prize-count" value="1" min="1" style="width:80px;"><button class="action-btn danger" onclick="this.parentElement.remove()">✕</button>`;
    document.getElementById('prizeList').appendChild(div);
}

async function createLottery() {
    const title = document.getElementById('ltTitle').value || 'TX聊天室 发起了抽奖活动';
    const winnerCount = parseInt(document.getElementById('ltWinCount').value) || 1;
    const hours = parseInt(document.getElementById('ltHours').value) || 24;

    const prizes = [];
    document.querySelectorAll('.prize-row').forEach(row => {
        const name = row.querySelector('.prize-name').value.trim();
        const count = parseInt(row.querySelector('.prize-count').value) || 1;
        if (name) prizes.push({ name, count });
    });
    if (prizes.length === 0) prizes.push({ name: '奖品', count: 1 });

    const now = Date.now();
    const lotteryData = {
        title, type: '群抽奖', winnerCount, prizes,
        startTime: now,
        endTime: now + hours * 3600000,
        createdAt: now,
        status: 'active',
        participants: {},
        winners: []
    };

    const ref = await lotteryRef.push();
    await ref.set(lotteryData);

    // 广播到聊天室
    const info = formatLotteryForChat(lotteryData);
    messagesRef.push({
        userId: 'bot_txchat', userName: 'TxChat小助手', userAvatar: '#27ae60',
        text: info, timestamp: firebase.database.ServerValue.TIMESTAMP, type: 'lottery'
    });

    alert('✅ 抽奖已创建并广播！');
    loadLotteryPage();
}

function formatLotteryForChat(lottery) {
    const endDate = new Date(lottery.endTime);
    const startDate = new Date(lottery.startTime || lottery.createdAt);
    const timeStr = endDate.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
    const startStr = startDate.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
    const prizes = lottery.prizes || [];

    let info = `🎁 ${lottery.title}\n`;
    info += `──────────────────\n`;
    info += `已开奖: 0  未开奖: 1  取消: 0\n`;
    info += `──────────────────\n`;
    info += `├活动类型: 群抽奖\n`;
    info += `├定时开奖: ${timeStr}  UTC+8\n`;
    info += `├参与条件: 发送 #参与抽奖\n`;
    info += `├抽奖开始时间: ${startStr}  UTC+8\n`;
    info += `├奖品列表:\n`;
    prizes.forEach(p => { info += `│  ├ ${p.name} x ${p.count || 1}\n`; });
    info += `──────────────────\n`;
    info += `[如何参与？]在群组中发送 #参与抽奖，参与活动。\n`;
    info += `发送『抽奖』查询当前群组的抽奖`;
    return info;
}

async function drawNow(key) {
    const s = await lotteryRef.child(key).once('value');
    const lottery = s.val();
    if (!lottery) return;
    const participants = Object.values(lottery.participants || {});
    if (participants.length === 0) { alert('没有参与者'); return; }
    
    const count = Math.min(lottery.winnerCount || 1, participants.length);
    const shuffled = [...participants].sort(() => Math.random() - 0.5);
    const winners = shuffled.slice(0, count);

    await lotteryRef.child(key).update({ status: 'won', winners, drawTime: Date.now() });

    // 广播结果
    const prizes = lottery.prizes || [];
    let msg = `🎉 抽奖结果公布！\n🎁 ${lottery.title}\n──────────────────\n中奖名单：\n`;
    winners.forEach((w, i) => { msg += `🏆 ${w.name} - ${prizes[i]?.name || prizes[0]?.name || '奖品'}\n`; });
    msg += `──────────────────\n恭喜以上中奖用户！`;
    
    messagesRef.push({
        userId: 'bot_txchat', userName: 'TxChat小助手', userAvatar: '#27ae60',
        text: msg, timestamp: firebase.database.ServerValue.TIMESTAMP, type: 'lottery'
    });

    alert('✅ 开奖完成！');
    loadLotteryPage();
}

async function broadcastLottery(key) {
    const s = await lotteryRef.child(key).once('value');
    const lottery = s.val();
    if (!lottery) return;
    const info = formatLotteryForChat(lottery);
    messagesRef.push({
        userId: 'bot_txchat', userName: 'TxChat小助手', userAvatar: '#27ae60',
        text: info, timestamp: firebase.database.ServerValue.TIMESTAMP, type: 'lottery'
    });
    alert('✅ 已广播');
}

async function cancelLottery(key) {
    if (confirm('取消此抽奖？')) {
        await lotteryRef.child(key).update({ status: 'cancelled' });
        messagesRef.push({
            userId: 'bot_txchat', userName: 'TxChat小助手', userAvatar: '#27ae60',
            text: '⚠️ 抽奖活动已取消', timestamp: firebase.database.ServerValue.TIMESTAMP, type: 'warning'
        });
        alert('已取消');
        loadLotteryPage();
    }
}
async function deleteLottery(key) {
    if (confirm('删除此抽奖？')) { await lotteryRef.child(key).remove(); alert('已删除'); loadLotteryPage(); }
}

            <button class="action-btn danger" onclick="if(confirm('清空所有用户？')){accountsRef.remove();usersRef.remove();alert('已清空');}" style="margin-left:10px;">🗑️ 清空用户</button>
        </div></div>`;
}

loadDashboard();

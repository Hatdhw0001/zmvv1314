<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TxChat · 后台管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --accent: #3a8fd4;
            --danger: #e74c3c;
            --warning: #f39c12;
            --success: #27ae60;
            --text: #e0e0e0;
            --text2: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* ========== 登录 ========== */
        .login-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .login-screen.hidden { display: none; }

        .login-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 40px 30px;
            width: 90%;
            max-width: 380px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .login-card h2 { margin-bottom: 8px; font-size: 22px; }
        .login-card p { color: var(--text2); margin-bottom: 24px; font-size: 13px; }
        .login-card input {
            width: 100%; padding: 14px 16px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 10px; color: white; font-size: 15px;
            margin-bottom: 12px; outline: none;
        }
        .login-card input:focus { border-color: var(--accent); }
        .login-card button {
            width: 100%; padding: 14px;
            background: var(--accent); border: none;
            border-radius: 10px; color: white;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .login-error { color: var(--danger); font-size: 13px; margin-top: 8px; }

        /* ========== 主界面 ========== */
        .admin-container {
            display: flex;
            width: 100%; height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 16px;
            font-weight: 700;
            text-align: center;
        }
        .sidebar-header i { color: var(--accent); margin-right: 6px; }
        .sidebar-nav { flex: 1; padding: 10px 0; }
        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--text2);
            transition: 0.2s;
            border-left: 3px solid transparent;
        }
        .nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
        .nav-item.active {
            background: rgba(58,143,212,0.1);
            color: var(--accent);
            border-left-color: var(--accent);
        }
        .nav-item i { width: 20px; text-align: center; }
        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }
        .logout-btn {
            width: 100%; padding: 10px;
            background: var(--danger);
            border: none; border-radius: 8px;
            color: white; font-size: 13px; cursor: pointer;
        }

        /* 内容区 */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .content-header {
            padding: 16px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin: 8px 0;
        }
        .stat-card .stat-label { font-size: 13px; color: var(--text2); }
        .stat-card.online .stat-value { color: var(--success); }
        .stat-card.messages .stat-value { color: var(--accent); }
        .stat-card.muted .stat-value { color: var(--danger); }
        .stat-card.users .stat-value { color: var(--warning); }

        /* 表格 */
        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .table-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            background: var(--bg);
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
            color: var(--text2);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            text-transform: uppercase;
        }
        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
        }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-success { background: rgba(39,174,96,0.2); color: var(--success); }
        .badge-danger { background: rgba(231,76,60,0.2); color: var(--danger); }
        .badge-warning { background: rgba(243,156,18,0.2); color: var(--warning); }
        .badge-info { background: rgba(58,143,212,0.2); color: var(--accent); }

        .action-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 12px;
            margin: 0 3px;
            transition: 0.2s;
        }
        .action-btn:hover { background: var(--border); }
        .action-btn.danger { color: var(--danger); border-color: var(--danger); }
        .action-btn.warning { color: var(--warning); border-color: var(--warning); }
        .action-btn.success { color: var(--success); border-color: var(--success); }

        .search-box {
            padding: 10px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 13px;
            outline: none;
            width: 250px;
        }
        .search-box:focus { border-color: var(--accent); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2);
        }
        .empty-state i { font-size: 48px; margin-bottom: 16px; display: block; }

        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar .nav-item span { display: none; }
            .sidebar-header span { display: none; }
            .sidebar-header { text-align: center; padding: 16px 8px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .search-box { width: 150px; }
            table { font-size: 11px; }
            th, td { padding: 8px 6px; }
        }
    </style>
</head>
<body>

    <!-- 登录界面 -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h2>🛡️ 后台管理</h2>
            <p>TxChat 管理系统</p>
            <input type="password" id="adminPassword" placeholder="请输入管理密码" autocomplete="off">
            <button onclick="handleAdminLogin()">登 录</button>
            <div class="login-error" id="loginError"></div>
            <p style="margin-top:16px;font-size:11px;color:var(--text2);">默认密码: 看你妈</p>
        </div>
    </div>

    <!-- 管理界面 -->
    <div class="admin-container" id="adminPanel" style="display:none;">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-shield-alt"></i> <span>TxChat 管理</span>
            </div>
            <div class="sidebar-nav">
                <div class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard', this)">
                    <i class="fas fa-th-large"></i> <span>仪表盘</span>
                </div>
                <div class="nav-item" data-page="users" onclick="switchPage('users', this)">
                    <i class="fas fa-users"></i> <span>用户管理</span>
                </div>
                <div class="nav-item" data-page="messages" onclick="switchPage('messages', this)">
                    <i class="fas fa-comments"></i> <span>消息管理</span>
                </div>
                <div class="nav-item" data-page="mutes" onclick="switchPage('mutes', this)">
                    <i class="fas fa-ban"></i> <span>禁言管理</span>
                </div>
                <div class="nav-item" data-page="settings" onclick="switchPage('settings', this)">
                    <i class="fas fa-cog"></i> <span>系统设置</span>
                </div>
            </div>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="handleLogout()">退出登录</button>
            </div>
        </div>

        <!-- 内容区 -->
        <div class="content">
            <div class="content-header">
                <span id="pageTitle">📊 仪表盘</span>
                <span style="font-size:13px;color:var(--text2);" id="currentTime"></span>
            </div>
            <div class="content-body" id="contentBody">
                <!-- 动态加载内容 -->
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCI5yewq1Cu5I38LLjuky9KG1rnKh76W4Q",
            authDomain: "zmvv2011.firebaseapp.com",
            databaseURL: "https://zmvv2011-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "zmvv2011",
            storageBucket: "zmvv2011.firebasestorage.app",
            messagingSenderId: "793178735751",
            appId: "1:793178735751:web:626cca2b17d34681cce422",
            measurementId: "G-1ENE8S87JN"
        };

        const ADMIN_PASSWORD = 'admin123';
        let database, accountsRef, messagesRef, usersRef, mutesRef, warnsRef;
        let currentPage = 'dashboard';

        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            accountsRef = database.ref('accounts');
            messagesRef = database.ref('messages');
            usersRef = database.ref('users');
            mutesRef = database.ref('mutes');
            warnsRef = database.ref('warns');
        } catch (e) {
            console.error('Firebase 初始化失败', e);
        }

        // 更新时间
        setInterval(() => {
            const now = new Date();
            document.getElementById('currentTime').textContent = 
                now.toLocaleDateString('zh-CN') + ' ' + now.toLocaleTimeString('zh-CN');
        }, 1000);

        // ==================== 登录 ====================
        function handleAdminLogin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminPanel').style.display = 'flex';
                loadDashboard();
            } else {
                document.getElementById('loginError').textContent = '密码错误';
            }
        }

        function handleLogout() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginError').textContent = '';
        }

        // 回车登录
        document.getElementById('adminPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleAdminLogin();
        });

        // ==================== 页面切换 ====================
        function switchPage(page, el) {
            currentPage = page;
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (el) el.classList.add('active');

            const titles = {
                dashboard: '📊 仪表盘',
                users: '👥 用户管理',
                messages: '💬 消息管理',
                mutes: '🚫 禁言管理',
                settings: '⚙️ 系统设置'
            };
            document.getElementById('pageTitle').textContent = titles[page] || '';

            switch (page) {
                case 'dashboard': loadDashboard(); break;
                case 'users': loadUsers(); break;
                case 'messages': loadMessages(); break;
                case 'mutes': loadMutes(); break;
                case 'settings': loadSettings(); break;
            }
        }

        // ==================== 仪表盘 ====================
        function loadDashboard() {
            Promise.all([
                accountsRef.once('value'),
                messagesRef.once('value'),
                usersRef.once('value'),
                mutesRef.once('value')
            ]).then(([accounts, messages, users, mutes]) => {
                const totalUsers = Object.keys(accounts.val() || {}).length;
                const totalMessages = Object.keys(messages.val() || {}).length;
                const onlineUsers = Object.keys(users.val() || {}).length;
                const mutedUsers = Object.keys(mutes.val() || {}).length;

                document.getElementById('contentBody').innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card users"><div class="stat-label">注册用户</div><div class="stat-value">${totalUsers}</div></div>
                        <div class="stat-card online"><div class="stat-label">在线用户</div><div class="stat-value">${onlineUsers}</div></div>
                        <div class="stat-card messages"><div class="stat-label">总消息数</div><div class="stat-value">${totalMessages}</div></div>
                        <div class="stat-card muted"><div class="stat-label">禁言用户</div><div class="stat-value">${mutedUsers}</div></div>
                    </div>
                    <div class="table-container">
                        <div class="table-header">📋 最近消息</div>
                        <div id="recentMessages"></div>
                    </div>
                `;

                // 加载最近消息
                messagesRef.limitToLast(10).once('value').then(snapshot => {
                    const msgs = snapshot.val() || {};
                    const keys = Object.keys(msgs).reverse();
                    let html = '<table><tr><th>用户</th><th>内容</th><th>时间</th></tr>';
                    keys.forEach(key => {
                        const m = msgs[key];
                        if (m.type === 'system') return;
                        html += `<tr>
                            <td>${m.userName || '?'}</td>
                            <td>${(m.text || '').substring(0, 50)}</td>
                            <td>${formatTime(m.timestamp)}</td>
                        </tr>`;
                    });
                    html += '</table>';
                    document.getElementById('recentMessages').innerHTML = html || '<div class="empty-state">暂无消息</div>';
                });
            });
        }

        // ==================== 用户管理 ====================
        function loadUsers() {
            Promise.all([
                accountsRef.once('value'),
                usersRef.once('value'),
                mutesRef.once('value')
            ]).then(([accounts, online, mutes]) => {
                const allAccounts = accounts.val() || {};
                const onlineUsers = online.val() || {};
                const mutedUsers = mutes.val() || {};
                const searchHtml = '<input class="search-box" id="userSearch" placeholder="🔍 搜索用户..." oninput="filterUsers()">';

                let html = searchHtml + '<div class="table-container" style="margin-top:12px;"><table><tr><th>用户名</th><th>状态</th><th>禁言</th><th>注册时间</th><th>操作</th></tr>';
                
                Object.entries(allAccounts).forEach(([key, user]) => {
                    const isOnline = !!onlineUsers[key];
                    const isMuted = !!mutedUsers[key] && mutedUsers[key].until > Date.now();
                    const status = isOnline ? '<span class="badge badge-success">在线</span>' : '<span class="badge badge-info">离线</span>';
                    const muteStatus = isMuted ? '<span class="badge badge-danger">禁言中</span>' : '<span class="badge badge-success">正常</span>';
                    
                    html += `<tr data-username="${user.username}">
                        <td><strong>${user.username}</strong></td>
                        <td>${status}</td>
                        <td>${muteStatus}</td>
                        <td>${user.createdAt ? new Date(user.createdAt).toLocaleDateString('zh-CN') : '未知'}</td>
                        <td>
                            ${isMuted ? 
                                `<button class="action-btn success" onclick="unmuteUser('${key}')">解除禁言</button>` :
                                `<button class="action-btn warning" onclick="showMuteDialog('${key}', '${user.username}')">禁言</button>`
                            }
                            <button class="action-btn danger" onclick="deleteUser('${key}')">删除</button>
                        </td>
                    </tr>`;
                });
                
                html += '</table></div>';
                document.getElementById('contentBody').innerHTML = html;
            });
        }

        function filterUsers() {
            const search = document.getElementById('userSearch')?.value?.toLowerCase() || '';
            document.querySelectorAll('tr[data-username]').forEach(row => {
                row.style.display = row.dataset.username.toLowerCase().includes(search) ? '' : 'none';
            });
        }

        function showMuteDialog(userId, userName) {
            const minutes = prompt(`对 ${userName} 禁言多少分钟？`, '30');
            if (minutes && !isNaN(minutes) && minutes > 0) {
                mutesRef.child(userId).set({
                    until: Date.now() + minutes * 60000,
                    reason: '管理员禁言',
                    mutedAt: firebase.database.ServerValue.TIMESTAMP
                });
                alert(`${userName} 已被禁言 ${minutes} 分钟`);
                loadUsers();
            }
        }

        function unmuteUser(userId) {
            if (confirm('确定解除禁言？')) {
                mutesRef.child(userId).remove();
                alert('已解除禁言');
                loadUsers();
            }
        }

        function deleteUser(userId) {
            if (confirm('确定删除此用户？此操作不可恢复！')) {
                accountsRef.child(userId).remove();
                usersRef.child(userId).remove();
                mutesRef.child(userId).remove();
                warnsRef.child(userId).remove();
                alert('用户已删除');
                loadUsers();
            }
        }

        // ==================== 消息管理 ====================
        function loadMessages() {
            messagesRef.limitToLast(50).once('value').then(snapshot => {
                const msgs = snapshot.val() || {};
                const keys = Object.keys(msgs).reverse();
                
                let html = '<div class="table-container"><table><tr><th>用户</th><th>内容</th><th>类型</th><th>时间</th><th>操作</th></tr>';
                
                keys.forEach(key => {
                    const m = msgs[key];
                    const typeBadge = m.type === 'bot' ? '<span class="badge badge-info">机器人</span>' :
                                     m.type === 'warning' ? '<span class="badge badge-warning">警告</span>' :
                                     '<span class="badge badge-success">用户</span>';
                    
                    html += `<tr>
                        <td>${m.userName || '?'}</td>
                        <td>${(m.text || '').substring(0, 40)}</td>
                        <td>${typeBadge}</td>
                        <td>${formatTime(m.timestamp)}</td>
                        <td>
                            <button class="action-btn danger" onclick="deleteMessage('${key}')">删除</button>
                        </td>
                    </tr>`;
                });
                
                html += '</table></div>';
                document.getElementById('contentBody').innerHTML = html;
            });
        }

        function deleteMessage(msgKey) {
            if (confirm('确定删除此消息？')) {
                messagesRef.child(msgKey).remove();
                alert('消息已删除');
                loadMessages();
            }
        }

        // ==================== 禁言管理 ====================
        function loadMutes() {
            mutesRef.once('value').then(snapshot => {
                const mutes = snapshot.val() || {};
                let html = '<div class="table-container"><table><tr><th>用户ID</th><th>到期时间</th><th>原因</th><th>状态</th><th>操作</th></tr>';
                
                Object.entries(mutes).forEach(([key, mute]) => {
                    const isActive = mute.until > Date.now();
                    const status = isActive ? '<span class="badge badge-danger">生效中</span>' : '<span class="badge badge-success">已过期</span>';
                    
                    html += `<tr>
                        <td>${key}</td>
                        <td>${new Date(mute.until).toLocaleString('zh-CN')}</td>
                        <td>${mute.reason || '无'}</td>
                        <td>${status}</td>
                        <td>
                            <button class="action-btn success" onclick="unmuteUser('${key}')">解除</button>
                            <button class="action-btn danger" onclick="mutesRef.child('${key}').remove();loadMutes();">删除记录</button>
                        </td>
                    </tr>`;
                });
                
                html += '</table></div>';
                if (Object.keys(mutes).length === 0) {
                    html = '<div class="empty-state"><i class="fas fa-check-circle"></i>暂无禁言记录</div>';
                }
                document.getElementById('contentBody').innerHTML = html;
            });
        }

        // ==================== 系统设置 ====================
        function loadSettings() {
            document.getElementById('contentBody').innerHTML = `
                <div class="table-container" style="max-width:600px;">
                    <div class="table-header">⚙️ 系统设置</div>
                    <div style="padding:20px;">
                        <div style="margin-bottom:20px;">
                            <label style="display:block;margin-bottom:8px;font-weight:600;">修改管理员密码</label>
                            <input class="search-box" type="password" id="newPassword" placeholder="新密码" style="width:100%;margin-bottom:8px;">
                            <button class="action-btn success" onclick="changePassword()">修改密码</button>
                        </div>
                        <hr style="border-color:var(--border);margin:20px 0;">
                        <div style="margin-bottom:20px;">
                            <label style="display:block;margin-bottom:8px;font-weight:600;">清空所有消息</label>
                            <button class="action-btn danger" onclick="clearAllMessages()">清空消息</button>
                        </div>
                        <hr style="border-color:var(--border);margin:20px 0;">
                        <div>
                            <label style="display:block;margin-bottom:8px;font-weight:600;">清空所有用户</label>
                            <button class="action-btn danger" onclick="clearAllUsers()">清空用户</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function changePassword() {
            const newPw = document.getElementById('newPassword')?.value;
            if (newPw && newPw.length >= 6) {
                // 这里只是本地修改（实际应该存数据库）
                alert('密码已修改为: ' + newPw + '\n（注意：刷新后恢复默认密码，实际项目需存储到数据库）');
                document.getElementById('newPassword').value = '';
            } else {
                alert('密码至少6位');
            }
        }

        function clearAllMessages() {
            if (confirm('确定清空所有消息？此操作不可恢复！')) {
                if (confirm('再次确认：清空所有消息？')) {
                    messagesRef.remove();
                    alert('所有消息已清空');
                    loadDashboard();
                }
            }
        }

        function clearAllUsers() {
            if (confirm('确定清空所有用户？此操作不可恢复！')) {
                if (confirm('再次确认：清空所有用户数据？')) {
                    accountsRef.remove();
                    usersRef.remove();
                    alert('所有用户已清空');
                    loadDashboard();
                }
            }
        }

        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            return d.getHours().toString().padStart(2,'0') + ':' + 
                   d.getMinutes().toString().padStart(2,'0') + ' ' +
                   d.getMonth()+1 + '/' + d.getDate();
        }

        // 初始加载
        loadDashboard();
    </script>
</body>
</html>
